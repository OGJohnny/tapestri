<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tapestri</title>
    <link rel="icon" href="data:," />
    <link rel="stylesheet" href="./style.css" />
    <script defer src="./script.js"></script>
  </head>
  <body>
    <div class="app">
      <div class="sidebar">
        <div class="project-bar">
          <select id="project-select"></select>
          <button id="new-project-btn">+</button>
          <button id="rename-project-btn">✏️</button>
          <button id="delete-project-btn">🗑</button>
        </div>

        <div class="search-container">
          <input type="text" id="search-input" placeholder="Search..." />
        </div>

        <details open>
          <summary class="section-header">
            <span>Manuscript</span>
            <button class="add-btn">+</button>
          </summary>
          <ul data-type="chapter"></ul>
        </details>

        <details>
          <summary class="section-header">
            <span>Characters</span>
            <button class="add-btn">+</button>
          </summary>
          <ul data-type="character"></ul>
        </details>

        <details>
          <summary class="section-header">
            <span>Worldbuilding</span>
            <button class="add-btn">+</button>
          </summary>
          <ul data-type="world"></ul>
        </details>

        <details>
          <summary class="section-header">
            <span>Timeline</span>
            <button class="add-btn">+</button>
          </summary>
          <ul data-type="timeline"></ul>
        </details>

        <details>
          <summary class="section-header">
            <span>Research</span>
            <button class="add-btn">+</button>
          </summary>
          <ul data-type="notes"></ul>
        </details>

        <details>
          <summary class="section-header">
            <span>Ideas</span>
            <button class="add-btn">+</button>
          </summary>
          <ul data-type="ideas"></ul>
        </details>
      </div>

      <div class="editor">
        <div id="empty-state">Select or create a document</div>
        <div class="editor-top">
          <div class="editor-header">
            <input type="text" id="editor-title" placeholder="Title..." />
            <div class="editor-actions">
              <button id="export-btn">Export</button>
              <button id="export-doc-btn">Export Doc</button>
            </div>
          </div>

          <div class="format-toolbar">
            <button data-format="bold"><b>B</b></button>
            <button data-format="italic"><i>I</i></button>
            <button data-format="underline"><u>U</u></button>
          </div>

          <div class="meta-row">
            <div class="tag-container meta-block tags-block">
              <input
                type="text"
                id="tag-input"
                placeholder="Add tag and press Enter"
              />
              <div id="tag-list"></div>
            </div>

            <div class="relationships-container meta-block characters-block">
              <h4>Characters in this Chapter</h4>
              <div class="character-controls">
                <select id="character-select"></select>
                <button id="add-character-btn">Add Character</button>
              </div>
              <ul id="character-list"></ul>
            </div>
          </div>

          <div class="reverse-relationships">
            <h4>Appears in Chapters</h4>
            <ul id="chapter-appearances"></ul>
          </div>
        </div>
        <div class="editor-main">
          <textarea
            id="editor-content"
            placeholder="Start writing..."
          ></textarea>
          <div id="preview-pane"></div>
          <button id="toggle-preview">Toggle Preview</button>
        </div>
        <div class="editor-footer">
          <div id="word-count">Words: 0</div>
        </div>
      </div>
    </div>
  </body>
</html>
